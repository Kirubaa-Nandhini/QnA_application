<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Q&A Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }
    </style>
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <a href="{% url 'home' %}" class="text-2xl font-bold text-indigo-600 tracking-tight">Q&A App</a>
                <div class="flex items-center space-x-6">
                    {% if user.is_authenticated %}
                    <a href="{% url 'profile' %}"
                        class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">View Profile
                       </a>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit"
                            class="text-sm font-medium text-slate-600 hover:text-rose-600 transition">Logout</button>
                    </form>
                    {% else %}
                    <a href="{% url 'login' %}"
                        class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Login</a>
                    <a href="{% url 'signup' %}"
                        class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition shadow-sm">Sign
                        Up</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        {% block content %}{% endblock %}
    </main>
</body>

</html>
