<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Q&A Platform{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        .prose h3 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 1.5rem;
            margin-bottom: 0.75rem;
        }

        .prose ul {
            list-style-type: disc !important;
            padding-left: 1.5rem;
            margin: 1rem 0;
        }

        .prose ol {
            list-style-type: decimal !important;
            padding-left: 1.5rem;
            margin: 1rem 0;
        }

        .prose strong {
            font-weight: 800;
            color: #0f172a;
        }

        .prose em {
            font-style: italic;
        }

        .prose code {
            background-color: #f1f5f9;
            padding: 0.2rem 0.4rem;
            border-radius: 0.25rem;
            font-size: 0.875rem;
            color: #4338ca;
        }

        .glass {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
        }

        .shadow-inner-sm {
            box-shadow: inset 0 2px 4px 0 rgba(0, 0, 0, 0.03);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body class="bg-slate-50 text-slate-900 min-h-screen">
    <nav class="sticky top-0 z-50 glass border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center flex-1">
                <a href="{% url 'home' %}" class="text-2xl font-bold text-indigo-600 tracking-tight shrink-0">Q&A
                    App</a>

                <!-- Search Bar -->
                <form action="{% url 'question_list' %}" method="get"
                    class="hidden md:flex flex-1 max-w-xl mx-8 relative group">
                    <div
                        class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400 group-focus-within:text-indigo-500 transition-colors">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                                d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                        </svg>
                    </div>
                    <input type="text" name="q" value="{{ request.GET.q|default:'' }}"
                        class="block w-full pl-10 pr-3 py-2 bg-slate-100 border border-slate-200 rounded-xl text-sm leading-5 placeholder-slate-500 focus:outline-none focus:bg-white focus:ring-2 focus:ring-indigo-100 focus:border-indigo-400 transition-all sm:text-sm shadow-inner-sm"
                        placeholder="Search questions, tags, or topics...">
                </form>

                <div class="flex items-center space-x-6 shrink-0">
                    <a href="{% url 'question_list' %}"
                        class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Questions</a>
                    {% if user.is_authenticated %}
                    <a href="{% url 'question_create' %}"
                        class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Ask Question</a>
                    <a href="{% url 'profile' %}"
                        class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">View Profile</a>
                    <form action="{% url 'logout' %}" method="post" class="inline">
                        {% csrf_token %}
                        <button type="submit"
                            class="text-sm font-medium text-slate-600 hover:text-rose-600 transition">Logout</button>
                    </form>
                    {% else %}
                    <a href="{% url 'login' %}"
                        class="text-sm font-medium text-slate-600 hover:text-indigo-600 transition">Login</a>
                    <a href="{% url 'signup' %}"
                        class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-sm font-semibold hover:bg-indigo-700 transition shadow-sm">Sign
                        Up</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-10">
        {% block content %}{% endblock %}
    </main>

    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-20 right-5 z-[100] flex flex-col space-y-3"></div>

    <style>
        .toast-animate-in {
            animation: toast-in 0.3s ease-out forwards;
        }

        @keyframes toast-in {
            from {
                transform: translateY(-100%);
                opacity: 0;
            }

            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
    </style>
</body>

</html>
