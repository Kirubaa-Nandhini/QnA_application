{% extends 'base.html' %}

{% block title %}Password Reset Complete - Q&A Platform{% endblock %}

{% block content %}
<div class="flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
    <div class="max-w-md w-full space-y-8 glass p-8 rounded-xl shadow-lg border border-white text-center">
        <div
            class="bg-emerald-100 h-20 w-20 rounded-full flex items-center justify-center text-emerald-600 mx-auto mb-6">
            <svg class="h-10 w-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        <h2 class="text-3xl font-extrabold text-gray-900 mb-4">Password reset complete!</h2>
        <p class="text-slate-600 text-lg mb-10 leading-relaxed text-center">Your password has been set. You may go ahead
            and log in now.</p>
        <a href="{% url 'login' %}"
            class="bg-indigo-600 text-white px-8 py-3 rounded-xl font-bold hover:bg-indigo-700 transition shadow-md w-full sm:w-auto inline-block">Return
            to Login</a>
    </div>
</div>
{% endblock %}
