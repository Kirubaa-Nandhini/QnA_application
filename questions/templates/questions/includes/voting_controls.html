<div class="flex items-center space-x-1 voting-controls" data-object-id="{{ obj.id }}"
    data-content-type-id="{{ content_type_id }}">
    <!-- Quora-style Voting Pill -->
    <div
        class="flex items-center bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 dark:hover:bg-slate-700 transition shadow-sm transition-colors duration-200">
        <button type="button" onclick="handleVote('{{ content_type_id }}', '{{ obj.id }}', 1)"
            class="vote-btn upvote flex items-center space-x-2 px-4 py-1.5 rounded-l-full border-r border-slate-200 dark:border-slate-700 group transition-colors {% if user_vote == 1 %}bg-indigo-50 dark:bg-indigo-900/40 text-indigo-600 dark:text-indigo-400{% else %}text-slate-700 dark:text-slate-300{% endif %}"
            title="Upvote">
            <svg class="w-5 h-5 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 15l7-7 7 7"></path>
            </svg>
            <span class="text-xs sm:text-sm font-bold truncate">Upvote</span>
            <span class="w-px h-3 bg-slate-300 dark:bg-slate-600 mx-1"></span>
            <span class="score text-xs sm:text-sm font-black">{{ obj.score }}</span>
        </button>

        <button type="button" onclick="handleVote('{{ content_type_id }}', '{{ obj.id }}', -1)"
            class="vote-btn downvote px-3 py-1.5 rounded-r-full hover:bg-slate-300 dark:hover:bg-slate-600 transition group {% if user_vote == -1 %}bg-rose-50 dark:bg-rose-900/40 text-rose-600 dark:text-rose-400{% else %}text-slate-600 dark:text-slate-400{% endif %}"
            title="Downvote">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M19 9l-7 7-7-7"></path>
            </svg>
        </button>
    </div>
</div>
