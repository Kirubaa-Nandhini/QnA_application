<div class="mt-4 pt-4 border-t border-slate-50">
    <div id="comment-trigger-{{ obj.id }}" class="flex items-center justify-between group cursor-pointer"
        onclick="toggleComments('comments-{{ content_type_id }}-{{ obj.id }}')">
        <span class="text-xs font-bold text-slate-400 group-hover:text-indigo-600 transition tracking-tight">
            {{ comments|length }} comments
        </span>
        <svg class="w-4 h-4 text-slate-400 group-hover:text-indigo-600 transition" fill="none" stroke="currentColor"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
        </svg>
    </div>

    <div id="comments-{{ content_type_id }}-{{ obj.id }}"
        class="hidden mt-6 space-y-6 animate-in slide-in-from-top-2 duration-300">
        {% for comment in comments %}
        <div class="flex space-x-3 group/comment">
            <div
                class="flex-shrink-0 w-8 h-8 bg-slate-100 rounded-full flex items-center justify-center text-[10px] font-bold text-slate-600">
                {{ comment.user.username.0|upper }}
            </div>
            <div class="flex-1 space-y-1">
                <div class="flex items-center space-x-2">
                    <span class="text-sm font-bold text-slate-900">{{ comment.user.username }}</span>
                    <span class="text-[10px] text-slate-400">• {{ comment.created_at|timesince }} ago</span>
                </div>
                <p class="text-sm text-slate-600 leading-relaxed">{{ comment.content }}</p>
            </div>
        </div>
        {% endfor %}

        {% if user.is_authenticated %}
        <form action="{% url 'comment_create' %}" method="POST" class="mt-4">
            {% csrf_token %}
            <input type="hidden" name="content_type_id" value="{{ content_type_id }}">
            <input type="hidden" name="object_id" value="{{ obj.id }}">
            <div
                class="flex items-center space-x-3 bg-slate-50 rounded-full border border-slate-200 px-4 py-1.5 focus-within:ring-2 focus-within:ring-indigo-100 transition">
                <input type="text" name="content" placeholder="Add a comment..."
                    class="flex-1 bg-transparent border-none text-sm text-slate-600 focus:outline-none focus:ring-0">
                <button type="submit" class="text-indigo-600 text-sm font-bold hover:text-indigo-800 transition">
                    Add Comment
                </button>
            </div>
        </form>
        {% endif %}
    </div>
</div>
